services:
  - type: web
    name: sc-studio-infermieristico-staging
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: DISABLE_SCHEDULER=true flask --app app db upgrade && DISABLE_SCHEDULER=true flask --app app bootstrap-admin && gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 app:app
    healthCheckPath: /healthz
    autoDeployTrigger: off
    envVars:
      - key: FLASK_ENV
        value: production
      - key: APP_ENV
        value: staging
      - key: SECRET_KEY
        generateValue: true
      - key: MAIL_SUPPRESS_SEND
        value: "true"
      - key: WHATSAPP_REMINDERS_ENABLED
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: sc-studio-infermieristico-staging-db
          property: connectionString
      - key: ADMIN_BOOTSTRAP_USERNAME
        sync: false
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: STAGING_AUTH_USERNAME
        sync: false
      - key: STAGING_AUTH_PASSWORD
        sync: false

databases:
  - name: sc-studio-infermieristico-staging-db
    region: frankfurt
    plan: free
