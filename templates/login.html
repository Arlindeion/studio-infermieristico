<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso Admin — Studio Infermieristico</title>
    <link rel="icon" href="{{ url_for('static', filename='img/logo.png') }}" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Bricolage+Grotesque:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}?v=4.4">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}?v=4.5">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}?v=5.3">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}?v=4.2">
</head>
<body>

<div class="login-wrapper">
    <div class="login-box">
        <div class="login-logo">
    <img src="{{ url_for('static', filename='img/logo_black.png') }}" alt="Studio Infermieristico" class="logo-login" width="469" height="589">
</div>
        <h1>Area riservata</h1>
        <p class="sottotitolo">Accesso esclusivo per l'amministratore</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="login-errore">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="/admin/login">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div class="form-gruppo">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            <div class="form-gruppo">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-full-width">Accedi</button>
        </form>
        <p class="login-footer">
            <a href="/" class="login-footer-link">← Torna al sito</a>
        </p>
    </div>
</div>

</body>
</html>
